<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Website View</title>
    <style>
        body { margin: 0; padding: 0; font-family: sans-serif; }
        .pdf-container { width: 100%; height: 80vh; border: none; }
        iframe.web-view { width: 100%; height: 50vh; border: none; }
    </style>
</head>
<body>

    <!-- 1. The Website View -->
    <iframe class="web-view" src="https://billyholly007.github.io"></iframe>

    <hr>

    <!-- 2. The PDF View (Now correctly in the body) -->
    <!-- Note: Use %20 for spaces if you don't rename the file -->
    <object data="Kill%20Line.pdf" type="application/pdf" class="pdf-container">
        <p>Your browser doesn't support PDF embedding. 
           <a href="Kill%20Line.pdf">Click here to download the PDF.</a>
        </p>
    </object>

</body>
</html>
